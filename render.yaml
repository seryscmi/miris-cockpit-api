# Render Blueprint — automatisch als Web-Service deployen.
# In Render: "New +" → "Blueprint" → dieses Repo wählen. Danach die mit
# sync:false markierten Secrets im Dashboard eintragen. ADMIN_TOKEN wird
# automatisch generiert (Wert danach in die Cockpit-Einstellungen kopieren).
services:
  - type: web
    name: miris-cockpit-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: ADMIN_TOKEN
        generateValue: true
      - key: ALLOWED_ORIGIN
        value: https://seryscmi.github.io
      - key: SHOPIFY_STORE_HANDLE
        value: 9zjzs5-ri
      - key: SHOPIFY_API_VERSION
        value: "2026-07"
      - key: CLOUDINARY_CLOUD_NAME
        value: dg3k6nvwj
      - key: SHOPIFY_SHOP
        sync: false
      # Neuer Standard (Dev Dashboard): Client ID + Client Secret → Token automatisch
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      # Optional/alt: statischer Admin-Token (falls jemals verfügbar)
      - key: SHOPIFY_ADMIN_TOKEN
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Klaviyo (Phase 3): Kundenanliegen live aus der Chat-Eskalations-Metrik lesen
      - key: KLAVIYO_ESCALATION_METRIC
        value: MIRIS_CHAT_ESCALATION
      - key: KLAVIYO_REVISION
        value: "2026-04-15"
      - key: KLAVIYO_PRIVATE_API_KEY
        sync: false
      # Shared-DB (Neon): Anliegen + Chat-Transkripte lesen/verwalten (Mary schreibt)
      - key: DATABASE_URL
        sync: false
      # Zahlungsabgleich (Enable Banking / PSD2)
      - key: ENABLE_BANKING_APP_ID
        sync: false
      - key: ENABLE_BANKING_PRIVATE_KEY
        sync: false
      - key: BANK_REDIRECT_URL
        value: https://miris-cockpit-api.onrender.com/bank/callback
      - key: BANK_ASPSP_NAME
        sync: false
      - key: BANK_ASPSP_COUNTRY
        value: DE
      - key: BANK_CONSENT_DAYS
        value: "90"
      - key: BANK_SYNC_SECRET
        generateValue: true
      # Sicher per Default: nur wenn AUSDRÜCKLICH "false" wird echt abgehakt. Fehlt/andere Werte = Dry-Run.
      # Zum Scharfschalten nach der Verifikation: auf "false" setzen.
      - key: BANK_DRYRUN
        value: "true"
